<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala</title>
    <!-- daisy and Tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- style css link-->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <!-- nav bar -->
    <header>
        <div class="navbar bg-base-100 shadow-sm  bg-sky-100">
            <div class="navbar-start ">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                        <button class="btn"><i class="fa-solid fa-circle-question"></i> FAQ</button>

                        <button class="btn"><i class="fa-solid fa-book-open"></i> Learn</button>

                        <button class="btn"><i class="fa-solid fa-right-from-bracket"></i> LogOut</button>
                    </ul>
                </div>
                <a class="flex items-center gap-1 w-11/12 mx-auto" href="">
                    <span class="font-bold">English</span>
                    <img src="./assets/logo.png" alt="">
                    <span class="font-bangla font-black">জানালা</span>
                </a>
            </div>
            <div class="navbar-center navbar-end hidden lg:flex ">
                <ul class="menu menu-horizontal px-1 gap-5 mr-4">

                    <button class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i> FAQ</button>

                    <button class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i> Learn</button>

                    <button class="btn btn-outline btn-primary"><i class="fa-solid fa-right-from-bracket"></i>
                        LogOut</button>

                </ul>
            </div>

        </div>
    </header>
    <!-- hero section -->
    <section class="flex flex-col-reverse md:flex-row justify-between items-center w-11/12 mx-auto ">
        <div class="flex-1 space-y-4 text-center md:text-left">
            <h1 class="text-4xl font-bold"><span class="text-sky-600">English</span> is Easy!!</h1>
            <p class="font-bangla">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে
                চান, আমাদের
                Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>



            <div class="space-y-5">
                <input type="text" class="input" placeholder="Enter Your Name" /><br>


                <input type="password" class="input" placeholder="Password" /><br>

                <button c class="btn btn-primary">Get Started</button>
            </div>


        </div>
        <div class="flex-1">
            <img src="./assets/hero-student.png" alt="">
        </div>
    </section>

    <section class="mb-[50px]">
        <h1 class="text-4xl font-bold text-center mb-10"><span class="text-sky-600">Let's</span> Learn Vocubulary</h1>
        <div class="flex flex-wrap justify-center gap-8" id="level-container">

        </div>
    </section>

     <div id="loading" class="flex justify-center items-center hidden">
        <span class="loading loading-bars loading-xl"></span>

     </div>
    <div id="word-container" class="bg-gray-200  grid grid-cols-1 md:grid-cols-3 gap-5 p-12 w-11/12 mx-auto m-8">
        <div class=" col-span-full text-center space-y-3 font-bangla">

            <h1 class="text-gray-400 font-bold  ">আপনি এখনো কোন Lesson Select করেন নি</h1>
            <p class="font-bold text-4xl">একটি Lesson Select করুন।</p>
        </div>
    </div>

    <!-- Open the modal using ID.showModal() method -->

    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-show">
              
             


            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="./script/script.js"></script>
</body>

</html>
